name: Generate OS Lists

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "media/**"
      - "configs/**"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate lists
        run: python scripts/generate_os_lists.py

      - name: Commit updates
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add docs/*.md
          git commit -m "Auto-generate OS software lists" || echo "No changes"
          git push
