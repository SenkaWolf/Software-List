name: Generate OS Lists

on:
  push:
    branches: [ main ]

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.x

    - name: Run generator
      run: python scripts/generate_os_lists.py

    - name: Commit generated files
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add docs/*.md
        git commit -m "Auto-generate OS software lists" || echo "No changes"
        git push
